services:
  - type: web
    name: a25-handover-web
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @a25/web build
    startCommand: pnpm --filter @a25/web start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
  - type: web
    name: a25-handover-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @a25/api db:generate && pnpm --filter @a25/api build
    startCommand: pnpm --filter @a25/api start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: WEB_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: a25-handover-redis
          type: keyvalue
          property: connectionString
  - type: worker
    name: a25-handover-worker
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @a25/worker build
    startCommand: pnpm --filter @a25/worker start:prod
    envVars:
      - key: REDIS_URL
        fromService:
          name: a25-handover-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
  - type: cron
    name: a25-handover-scheduler
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @a25/worker build
    startCommand: pnpm --filter @a25/worker start:scheduler
    envVars:
      - key: REDIS_URL
        fromService:
          name: a25-handover-redis
          type: keyvalue
          property: connectionString
  - type: keyvalue
    name: a25-handover-redis
    plan: free
    ipAllowList: []
